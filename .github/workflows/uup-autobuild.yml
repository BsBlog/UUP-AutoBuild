name: UUP Auto Build

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: Rebuild even if the same channel/language/build tag already exists
        required: false
        default: true
        type: boolean
      channels:
        description: Comma-separated channels
        required: false
        default: RETAIL,WIF,WIS,CANARY
        type: string
      languages:
        description: Comma-separated languages
        required: false
        default: zh-cn,en-us
        type: string
      arch:
        description: Comma-separated architectures
        required: false
        default: amd64,arm64
        type: string
      search_term:
        description: Search keyword used when filtering the latest Windows build
        required: false
        default: Windows
        type: string
  schedule:
    - cron: "0 3 * * *"

jobs:
  Prepare:
    name: Prepare Latest Builds
    runs-on: windows-latest
    outputs:
      matrix: ${{ steps.prepare.outputs.matrix }}
      build_count: ${{ steps.prepare.outputs.build_count }}
      first_tag_name: ${{ steps.prepare.outputs.first_tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Build Matrix
        id: prepare
        run: |
          $ErrorActionPreference = 'Stop'

          $channelInput = "${{ github.event.inputs.channels || '' }}"
          $languageInput = "${{ github.event.inputs.languages || '' }}"
          $archInput = "${{ github.event.inputs.arch || '' }}"
          $searchInput = "${{ github.event.inputs.search_term || '' }}"
          $forceBuild = "${{ github.event.inputs.force_build || 'true' }}" -eq 'false'

          $defaultChannels = @('RETAIL', 'WIF', 'WIS', 'CANARY')
          $defaultLanguages = @('zh-cn', 'en-us')
          $defaultArchitectures = @('amd64', 'arm64')
          $searchTerm = if ([string]::IsNullOrWhiteSpace($searchInput)) { 'Windows' } else { $searchInput.Trim() }

          $channelMap = @{
            RETAIL = @{ ring = 'RETAIL'; flight = 'Active' }
            WIF    = @{ ring = 'WIF';    flight = 'Active' }
            WIS    = @{ ring = 'WIS';    flight = 'Active' }
            CANARY = @{ ring = 'CANARY'; flight = 'Active' }
          }

          $channels = if ([string]::IsNullOrWhiteSpace($channelInput)) {
            $defaultChannels
          } else {
            $channelInput.Split(',') |
              ForEach-Object { $_.Trim().ToUpperInvariant() } |
              Where-Object { $_ } |
              Select-Object -Unique
          }

          $languages = if ([string]::IsNullOrWhiteSpace($languageInput)) {
            $defaultLanguages
          } else {
            $languageInput.Split(',') |
              ForEach-Object { $_.Trim().ToLowerInvariant() } |
              Where-Object { $_ } |
              Select-Object -Unique
          }

          $architectures = if ([string]::IsNullOrWhiteSpace($archInput)) {
            $defaultArchitectures
          } else {
            $archInput.Split(',') |
              ForEach-Object { $_.Trim().ToLowerInvariant() } |
              Where-Object { $_ } |
              Select-Object -Unique
          }

          $include = [System.Collections.ArrayList]::new()

          foreach ($architecture in $architectures) {
            foreach ($channel in $channels) {
              if (-not $channelMap.ContainsKey($channel)) {
                Write-Warning "Skipping unsupported channel input: $channel"
                continue
              }

              $ring = $channelMap[$channel].ring
              $flight = $channelMap[$channel].flight

              foreach ($language in $languages) {
                $metadataPath = Join-Path $env:RUNNER_TEMP "$channel-$architecture-$language-latest.json"

                try {
                  & "$PWD/scripts/Get-UUPLatest.ps1" `
                    -Arch $architecture `
                    -Ring $ring `
                    -Flight $flight `
                    -Sku 48 `
                    -SearchTerm $searchTerm `
                    -Language $language `
                    -Edition 'PROFESSIONAL' `
                    -OutputPath $metadataPath

                  $metadata = Get-Content -LiteralPath $metadataPath -Raw | ConvertFrom-Json -Depth 20

                  $tagName = ('{0}-{1}-{2}-{3}-{4}' -f `
                    $channel.ToLowerInvariant(), `
                    $metadata.foundBuild, `
                    $architecture.ToLowerInvariant(), `
                    $language.ToLowerInvariant(), `
                    'professional') -replace '[^0-9A-Za-z._-]', '-'

                  $tagProbe = git ls-remote --tags origin "refs/tags/$tagName"
                  $tagExists = -not [string]::IsNullOrWhiteSpace(($tagProbe | Out-String).Trim())

                  if ($tagExists -and -not $forceBuild) {
                    Write-Host "Skipping existing tag $tagName"
                    continue
                  }

                  [void]$include.Add([pscustomobject]@{
                    channel      = $channel
                    ring         = $ring
                    flight       = $flight
                    arch         = $architecture
                    sku          = 48
                    language     = $language
                    edition      = 'PROFESSIONAL'
                    search_term  = $searchTerm
                    source       = $metadata.source
                    update_id    = $metadata.updateId
                    update_title = $metadata.updateTitle
                    found_build  = $metadata.foundBuild
                    tag_name     = $tagName
                    tag_exists   = $tagExists
                  })
                } catch {
                  Write-Warning "Failed to prepare $channel / $architecture / ${language}: $($_.Exception.Message)"
                }
              }
            }
          }

          $matrixObject = [pscustomobject]@{
            include = @($include)
          }
          $matrix = $matrixObject | ConvertTo-Json -Compress -Depth 20

          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "matrix=$matrix"
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "build_count=$($include.Count)"
          $firstTagName = if ($include.Count -gt 0) { $include[0].tag_name } else { '' }
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "first_tag_name=$firstTagName"

          Write-Host "Preparation completed. Build count: $($include.Count)"

  Build:
    name: Build ${{ matrix.channel }} ${{ matrix.arch }} ${{ matrix.language }}
    needs: Prepare
    if: ${{ needs.Prepare.outputs.build_count != '0' }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.Prepare.outputs.matrix) }}
    env:
      CHANNEL: ${{ matrix.channel }}
      UPDATE_ID: ${{ matrix.update_id }}
      UPDATE_TITLE: ${{ matrix.update_title }}
      FOUND_BUILD: ${{ matrix.found_build }}
      RING: ${{ matrix.ring }}
      FLIGHT: ${{ matrix.flight }}
      ARCH: ${{ matrix.arch }}
      SKU: ${{ matrix.sku }}
      LANGUAGE: ${{ matrix.language }}
      EDITION: ${{ matrix.edition }}
      TAG_NAME: ${{ matrix.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Download Official Package And Build ISO
        id: build
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          $workRoot = Join-Path 'D:\UUP-Dump' $env:TAG_NAME
          $packageRoot = Join-Path $workRoot 'package'
          $outputRoot = Join-Path $workRoot 'dist'
          $packageZip = Join-Path $workRoot 'uupdump-package.zip'

          if (Test-Path -LiteralPath $workRoot) {
            Remove-Item -LiteralPath $workRoot -Recurse -Force
          }

          $null = New-Item -ItemType Directory -Path $packageRoot -Force
          $null = New-Item -ItemType Directory -Path $outputRoot -Force

          $packageUrl = 'https://uupdump.net/get.php?id={0}&pack={1}&edition={2}' -f `
            [uri]::EscapeDataString($env:UPDATE_ID), `
            [uri]::EscapeDataString($env:LANGUAGE), `
            [uri]::EscapeDataString($env:EDITION.ToLowerInvariant())

          $requestBody = @{
            autodl  = '2'
            updates = '1'
            cleanup = '1'
            netfx   = '1'
            esd     = '1'
          }

          Invoke-WebRequest `
            -Uri $packageUrl `
            -Method Post `
            -Body $requestBody `
            -Headers @{ 'User-Agent' = 'UUP-AutoBuild/1.0' } `
            -OutFile $packageZip

          $zipHeader = [System.IO.File]::ReadAllBytes($packageZip)
          if ($zipHeader.Length -lt 2 -or $zipHeader[0] -ne 0x50 -or $zipHeader[1] -ne 0x4B) {
            throw 'UUP dump did not return a valid zip package.'
          }

          Expand-Archive -LiteralPath $packageZip -DestinationPath $packageRoot -Force

          $convertConfigPath = Join-Path $packageRoot 'ConvertConfig.ini'
          if (Test-Path -LiteralPath $convertConfigPath) {
            $convertConfig = Get-Content -LiteralPath $convertConfigPath -Raw
            $convertConfig = $convertConfig.Replace('AutoExit     =0', 'AutoExit     =1')
            Set-Content -LiteralPath $convertConfigPath -Value $convertConfig -Encoding ASCII
          }

          $downloadScript = Join-Path $packageRoot 'uup_download_windows.cmd'
          if (-not (Test-Path -LiteralPath $downloadScript -PathType Leaf)) {
            throw 'Official UUP dump package does not contain uup_download_windows.cmd'
          }

          Push-Location -LiteralPath $packageRoot
          try {
            & $downloadScript
            if ($LASTEXITCODE -ne 0) {
              throw "uup_download_windows.cmd failed with exit code $LASTEXITCODE"
            }
          } finally {
            Pop-Location
          }

          $isoFile = Get-ChildItem -LiteralPath $packageRoot -Filter *.iso -File -Recurse |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1

          if ($null -eq $isoFile) {
            throw 'No ISO file was generated by the official UUP dump script.'
          }

          $artifactBaseName = ('Windows_{0}_{1}_{2}_{3}_{4}' -f `
            $env:FOUND_BUILD, `
            $env:CHANNEL, `
            $env:ARCH, `
            $env:LANGUAGE, `
            $env:EDITION).Replace(' ', '_') -replace '[^0-9A-Za-z._-]', '-'
          $finalIsoPath = Join-Path $outputRoot "$artifactBaseName.iso"

          Copy-Item -LiteralPath $isoFile.FullName -Destination $finalIsoPath -Force

          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "iso_path=$finalIsoPath"
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "artifact_name=$artifactBaseName"

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@main
        with:
          name: iso-${{ matrix.tag_name }}
          path: ${{ steps.build.outputs.iso_path }}
          if-no-files-found: error
          compression-level: 0

  DeleteOldReleases:
    name: Delete Old Releases
    needs:
      - Prepare
      - Build
    if: ${{ always() && needs.Prepare.outputs.build_count != '0' && needs.Build.result != 'cancelled' }}
    runs-on: windows-latest
    steps:
      - name: Delete Existing Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          $releaseTags = @(gh release list --repo $env:GITHUB_REPOSITORY --limit 1000 --json tagName --jq '.[].tagName')
          $releaseTags = @($releaseTags | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })

          if ($releaseTags.Count -eq 0) {
            Write-Host 'No existing releases to delete.'
            exit 0
          }

          foreach ($releaseTag in $releaseTags) {
            Write-Host "Deleting release $releaseTag"
            gh release delete $releaseTag --repo $env:GITHUB_REPOSITORY --yes --cleanup-tag
          }

  Release:
    name: Release ${{ matrix.tag_name }}
    needs:
      - Prepare
      - Build
      - DeleteOldReleases
    if: ${{ always() && needs.Prepare.outputs.build_count != '0' && needs.Build.result != 'cancelled' && needs.DeleteOldReleases.result == 'success' }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.Prepare.outputs.matrix) }}
    env:
      GH_TOKEN: ${{ github.token }}
      CHANNEL: ${{ matrix.channel }}
      UPDATE_ID: ${{ matrix.update_id }}
      UPDATE_TITLE: ${{ matrix.update_title }}
      FOUND_BUILD: ${{ matrix.found_build }}
      ARCH: ${{ matrix.arch }}
      LANGUAGE: ${{ matrix.language }}
      EDITION: ${{ matrix.edition }}
      TAG_NAME: ${{ matrix.tag_name }}
    steps:
      - name: Package And Publish Release
        run: |
          $ErrorActionPreference = 'Stop'

          $artifactName = "iso-$env:TAG_NAME"
          $entryRoot = Join-Path $env:RUNNER_TEMP $env:TAG_NAME
          $artifactDir = Join-Path $entryRoot 'artifact'
          $releaseAssetDir = Join-Path $entryRoot 'release-assets'

          if (Test-Path -LiteralPath $entryRoot) {
            Remove-Item -LiteralPath $entryRoot -Recurse -Force
          }
          $null = New-Item -ItemType Directory -Path $artifactDir -Force
          $null = New-Item -ItemType Directory -Path $releaseAssetDir -Force

          & gh run download $env:GITHUB_RUN_ID --repo $env:GITHUB_REPOSITORY --name $artifactName --dir $artifactDir
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "Artifact $artifactName was not found. Skipping $env:TAG_NAME."
            exit 0
          }

          $isoPath = Get-ChildItem -LiteralPath $artifactDir -Filter *.iso -File -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if ([string]::IsNullOrWhiteSpace($isoPath)) {
            Write-Warning "No ISO was found inside artifact $artifactName. Skipping $env:TAG_NAME."
            Remove-Item -LiteralPath $entryRoot -Recurse -Force
            exit 0
          }

          Add-Type -AssemblyName System.IO.Compression.FileSystem

          $zipPath = Join-Path $releaseAssetDir ("{0}.zip" -f [System.IO.Path]::GetFileNameWithoutExtension($isoPath))
          $zipFileStream = [System.IO.File]::Open($zipPath, [System.IO.FileMode]::Create, [System.IO.FileAccess]::ReadWrite, [System.IO.FileShare]::None)
          try {
            $zipArchive = [System.IO.Compression.ZipArchive]::new($zipFileStream, [System.IO.Compression.ZipArchiveMode]::Create, $false)
            try {
              [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile(
                $zipArchive,
                $isoPath,
                [System.IO.Path]::GetFileName($isoPath),
                [System.IO.Compression.CompressionLevel]::NoCompression
              ) | Out-Null
            } finally {
              $zipArchive.Dispose()
            }
          } finally {
            $zipFileStream.Dispose()
          }

          $releaseAssetSummary = 'ZIP'
          $zipItem = Get-Item -LiteralPath $zipPath
          $releaseAssetSizeLimitBytes = 1900MB
          if ($zipItem.Length -gt $releaseAssetSizeLimitBytes) {
            $bufferSize = 4MB
            $buffer = New-Object byte[] $bufferSize
            $partIndex = 1

            $inputStream = [System.IO.File]::OpenRead($zipPath)
            try {
              while ($inputStream.Position -lt $inputStream.Length) {
                $partPath = "{0}.{1:D3}" -f $zipPath, $partIndex
                $outputStream = [System.IO.File]::Open($partPath, [System.IO.FileMode]::Create, [System.IO.FileAccess]::Write, [System.IO.FileShare]::None)
                try {
                  $remainingInPart = [int64]$releaseAssetSizeLimitBytes
                  while ($remainingInPart -gt 0 -and $inputStream.Position -lt $inputStream.Length) {
                    $remainingFileBytes = $inputStream.Length - $inputStream.Position
                    $bytesToRead = [Math]::Min([int64]$buffer.Length, [Math]::Min($remainingInPart, $remainingFileBytes))
                    $read = $inputStream.Read($buffer, 0, [int]$bytesToRead)
                    if ($read -le 0) {
                      break
                    }

                    $outputStream.Write($buffer, 0, $read)
                    $remainingInPart -= $read
                  }
                } finally {
                  $outputStream.Dispose()
                }

                $partIndex++
              }
            } finally {
              $inputStream.Dispose()
            }

            Remove-Item -LiteralPath $zipPath -Force
            $releaseAssetSummary = 'Split ZIP parts (1.9 GB each, reassemble before extracting)'
          }

          $releaseAssets = Get-ChildItem -LiteralPath $releaseAssetDir -File | Sort-Object Name
          if ($releaseAssets.Count -eq 0) {
            throw "No release assets were produced for $env:TAG_NAME."
          }

          $releaseNotesPath = Join-Path $releaseAssetDir 'release-notes.txt'
          @(
            "Channel: $env:CHANNEL"
            "Build: $env:FOUND_BUILD"
            "Title: $env:UPDATE_TITLE"
            "Architecture: $env:ARCH"
            "Language: $env:LANGUAGE"
            "Edition: $env:EDITION"
            "UUP Update ID: $env:UPDATE_ID"
            'Conversion: official UUP dump package'
            'Options: updates + cleanup + .NET Framework 3.5 + ESD'
            "Release Asset Format: $releaseAssetSummary"
          ) | Set-Content -LiteralPath $releaseNotesPath -Encoding UTF8

          $releaseTitle = "Windows $env:FOUND_BUILD $env:CHANNEL $env:ARCH $env:LANGUAGE $env:EDITION"
          $assetPaths = @($releaseAssets | ForEach-Object { $_.FullName })

          gh release create $env:TAG_NAME @assetPaths `
            --repo $env:GITHUB_REPOSITORY `
            --title $releaseTitle `
            --notes-file $releaseNotesPath

          Remove-Item -LiteralPath $entryRoot -Recurse -Force

  Finalize:
    name: Finalize Workflow
    needs: Release
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
